<div class="bg-white">
  <div class="relative isolate px-6 pt-14 lg:px-8">
    <!-- Gradient background decoration (top) -->
    <div class="absolute inset-x-0 -top-40 -z-10 transform-gpu overflow-hidden blur-3xl sm:-top-80" aria-hidden="true">
      <div
        class="relative left-[calc(50%-11rem)] aspect-[1155/678] w-[36.125rem] -translate-x-1/2 rotate-[30deg] bg-gradient-to-tr from-[#ff80b5] to-[#9089fc] opacity-30 sm:left-[calc(50%-30rem)] sm:w-[72.1875rem]"
        style="clip-path: polygon(74.1% 44.1%, 100% 61.6%, 97.5% 26.9%, 85.5% 0.1%, 80.7% 2%, 72.5% 32.5%, 60.2% 62.4%, 52.4% 68.1%, 47.5% 58.3%, 45.2% 34.5%, 27.5% 76.7%, 0.1% 64.9%, 17.9% 100%, 27.6% 76.8%, 76.1% 97.7%, 74.1% 44.1%)">
      </div>
    </div>

    <!-- Centered Content -->
    <div class="mx-auto max-w-2xl pt-16 sm:pt-24 lg:pt-32 text-center">
      <!-- Optional badge or announcement -->
      <div class="hidden sm:mb-8 sm:flex sm:justify-center">
        <div
          class="relative rounded-full px-3 py-1 text-sm text-gray-600 ring-1 ring-gray-900/10 hover:ring-gray-900/20">
          Fluent in Dutch (and dad jokes). <a href="#" class="font-semibold text-indigo-600">Give it a go <span
              aria-hidden="true">&rarr;</span></a>
        </div>
      </div>

      <!-- App Title -->
      <h1 class="text-5xl font-bold tracking-tight text-gray-900 sm:text-6xl flex justify-center items-center gap-2">
        🇳🇱 <span>Hallo Dutch!</span>
      </h1>

      <!-- Subtitle -->
      <p class="mt-8 text-lg text-gray-600 sm:text-xl">
        Stuck on grammar? Can’t remember ‘fiets’ or ‘lekker’? Don’t worry — I’ve got your back (in perfect Dutch).
      </p>

      <!-- Input Section (static for now) -->
      <div class="mt-10">
        <label for="question" class="block mb-2 text-sm font-medium text-left text-gray-700">What’s on your
          mind?</label>
        <input id="question" type="text" placeholder="e.g., What does ‘Ik hou van bitterballen’ mean?”"
          [(ngModel)]="prompt" [ngClass]="{ 'invalid': questionRef.touched && questionRef.invalid }"
          #questionRef="ngModel"
          class="w-full px-4 py-3 rounded-md border bg-gray-50 placeholder-gray-400 text-indigo-950 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          style="border-color: rgba(55, 48, 163, 0.19);" />
        <button class="mt-4 px-5 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition"
          (click)="askQuestion()">
          Ask
        </button>
      </div>
    </div>
    <div class="py-8 px-4 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-7xl flex justify-center">
        <div class="bg-white border-2 rounded-2xl p-6 py-12 w-full text-left"
          style="border-color: rgba(55, 48, 163, 0.19);">
          <article class="prose max-w-none">
            <markdown appShowSelectionOptions class="custom-md" [data]="answer()"></markdown>
          </article>
        </div>
      </div>
    </div>
  </div>
</div>
